name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Branch or commit to deploy'
        required: true
        default: 'main'
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: |
          npm run build --workspace=backend
          npm run build --workspace=frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -f apps/backend/Dockerfile -t backend:${{ github.sha }} .
          docker build -f apps/frontend/Dockerfile -t frontend:${{ github.sha }} .

      - name: Deploy to Dokploy
        run: |
          echo "Deploying to ${{ inputs.environment }} environment..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ inputs.ref }}"
          # Dokploy Git-based deployment is triggered automatically
          # This step is for manual trigger confirmation
          
      - name: Notify deployment status
        run: |
          echo "✅ Deployment to ${{ inputs.environment }} initiated"
          echo "📦 Commit: ${{ github.sha }}"
          echo "🔗 Check Dokploy dashboard for deployment status"

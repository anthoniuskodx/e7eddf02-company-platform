compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-10-22"

name = "snappbiz-server-dev"
main = "src/index.ts"
route = { pattern = "gw-dev.snappbiz.com", zone_id = "16252fdf62cce7e349fb5fe9bd392adf", custom_domain = true } 
services = [
  { binding = "AUTH_WORKER", service = "snappbiz-auth-worker", entrypoint = "AuthWorker" }
]

[observability]
enabled = true
head_sampling_rate = 1

[dev]
port = 3000

################# AUTH GATEWAY DEV SECTION #################
[vars]
SUPERADMIN_KEY = "SUPERADMIN_KEY"
NODE_ENV = "development"
BACKEND_URL = "https://gw-dev.snappbiz.com"
JWT_SECRET = "secretive_jwt_secret"
################# END AUTH GATEWAY DEV SECTION #################